<style>
:root{
  --ink:#0d0b09; --panel:#15110d; --panel2:#1c1711;
  --line:rgba(240,232,218,.12); --line2:rgba(240,232,218,.06);
  --bone:#f0e8da; --dim:#a89a85; --faint:#6f6557;
  --ochre:#d4814a; --gold:#d8a850; --clay:#bb5638; --sage:#9aa46a; --steel:#6fb0c8; --violet:#a692d8;
  --maxw:1140px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--bone);font-family:"Spectral",Georgia,serif;font-size:18px;line-height:1.72;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body.lang-zh{font-family:"Noto Serif SC","Spectral",serif}
::selection{background:rgba(212,129,74,.32);color:#fff}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}

.lang-en .zh-only{display:none}
.lang-zh .en-only{display:none}
.mono{font-family:"Space Mono",monospace}
.cinzel{font-family:"Cinzel",serif;letter-spacing:.04em}

/* nav */
nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:14px clamp(16px,4vw,40px);background:linear-gradient(180deg,rgba(13,11,9,.92),rgba(13,11,9,0));backdrop-filter:blur(8px);transition:top .3s}
nav.scrolled{background:rgba(13,11,9,.92);border-bottom:1px solid var(--line2)}
.brand{display:flex;align-items:center;gap:10px;font-family:"Cinzel",serif;font-weight:700;letter-spacing:.12em;font-size:15px}
.brand svg{width:24px;height:24px;flex:none}
.brand .sub{font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.04em;color:var(--dim);font-weight:400}
.nav-links{display:flex;gap:24px;align-items:center}
.nav-links a{font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.07em;text-transform:uppercase;color:var(--dim);transition:color .2s}
.nav-links a:hover{color:var(--ochre)}
.langtog{font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.05em;border:1px solid var(--line);background:transparent;color:var(--bone);padding:7px 13px;border-radius:30px;cursor:pointer;transition:all .2s;white-space:nowrap}
.langtog:hover{border-color:var(--ochre);color:var(--ochre)}
@media(max-width:900px){.nav-links{display:none}}

section{position:relative;padding:clamp(74px,11vh,140px) clamp(16px,5vw,40px)}
.wrap{max-width:var(--maxw);margin:0 auto;position:relative;z-index:2}
.eyebrow{font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--ochre);margin-bottom:18px}
.eyebrow .n{color:var(--faint)}
h2.title{font-family:"Fraunces",serif;font-weight:900;font-size:clamp(30px,5.2vw,58px);line-height:1.05;letter-spacing:-.02em;margin-bottom:22px}
body.lang-zh h2.title{font-family:"Noto Serif SC",serif;letter-spacing:0}
.lede{font-size:clamp(18px,2.2vw,22px);color:#ddd3c2;max-width:780px;line-height:1.66}
.lede em{color:var(--gold);font-style:italic}
.divider{height:1px;background:var(--line);max-width:var(--maxw);margin:0 auto}

/* hero */
#hero{min-height:100vh;display:flex;align-items:center;padding-top:96px;overflow:hidden}
#deeptime{position:absolute;inset:0;width:100%;height:100%;z-index:1}
#hero::after{content:"";position:absolute;inset:0;z-index:1;background:radial-gradient(120% 80% at 50% 18%,transparent 40%,rgba(13,11,9,.55) 100%);pointer-events:none}
#hero .wrap{max-width:1000px}
.hero-kick{font-family:"Space Mono",monospace;font-size:12.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--ochre);margin-bottom:26px}
.hero-title{font-family:"Cinzel",serif;font-weight:900;font-size:clamp(60px,16vw,184px);line-height:.9;letter-spacing:.02em;margin-bottom:14px}
body.lang-zh .hero-title{font-family:"Noto Serif SC",serif;font-weight:900;font-size:clamp(54px,15vw,160px);letter-spacing:.02em}
.hero-title .arc{background:linear-gradient(100deg,var(--clay),var(--ochre) 38%,var(--gold) 64%,var(--steel));-webkit-background-clip:text;background-clip:text;color:transparent}
.hero-alt{font-family:"Space Mono",monospace;color:var(--dim);font-size:clamp(13px,2vw,17px);letter-spacing:.16em;margin-bottom:30px;text-transform:uppercase}
.hero-lede{font-size:clamp(19px,2.5vw,26px);max-width:700px;color:#e3d9c8;line-height:1.55;margin-bottom:18px}
.hero-lede b{color:var(--gold);font-weight:500}
.hero-by{color:var(--dim);font-size:15px;font-style:italic;margin-bottom:36px}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap}
.btn{font-family:"Space Mono",monospace;font-size:13px;letter-spacing:.06em;padding:14px 24px;border-radius:34px;cursor:pointer;transition:all .25s;border:1px solid var(--line);background:transparent;color:var(--bone)}
.btn.primary{background:var(--ochre);color:#1c0f06;border-color:var(--ochre);font-weight:700}
.btn.primary:hover{box-shadow:0 0 32px rgba(212,129,74,.45);transform:translateY(-2px)}
.btn:hover{border-color:var(--ochre);color:var(--ochre)}
.scroll-hint{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.2em;color:var(--faint);z-index:3;text-transform:uppercase}
.scroll-hint::after{content:"";display:block;width:1px;height:32px;background:linear-gradient(var(--ochre),transparent);margin:10px auto 0}

/* thesis */
#thesis{background:var(--panel)}
.thesis-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
@media(max-width:880px){.thesis-grid{grid-template-columns:1fr;gap:36px}}
.pull{font-family:"Fraunces",serif;font-style:italic;font-size:clamp(24px,3.4vw,40px);line-height:1.28;color:var(--bone)}
body.lang-zh .pull{font-family:"Noto Serif SC",serif;font-style:normal;font-weight:600}
.pull .hl{color:var(--gold)}
.thesis-body p{margin-bottom:18px;color:#d2c8b7}
.thesis-body p:last-child{margin-bottom:0}
.thesis-body .src{font-family:"Space Mono",monospace;font-size:12px;color:var(--faint);letter-spacing:.04em}

/* four revolutions */
#revolutions{background:var(--ink)}
.rev-rail{display:flex;gap:0;overflow-x:auto;border:1px solid var(--line);border-radius:14px;margin:38px 0 30px;scrollbar-width:thin}
.rev-tab{flex:1;min-width:140px;padding:18px 16px;cursor:pointer;border-right:1px solid var(--line2);transition:background .25s;position:relative;text-align:left}
.rev-tab:last-child{border-right:none}
.rev-tab:hover{background:var(--panel)}
.rev-tab.active{background:var(--panel2)}
.rev-tab.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--c,var(--ochre))}
.rev-tab .when{font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:.04em;color:var(--faint);margin-bottom:9px;white-space:nowrap}
.rev-tab .rt{font-family:"Fraunces",serif;font-weight:600;font-size:18px;line-height:1.12;color:var(--dim);transition:color .25s}
body.lang-zh .rev-tab .rt{font-family:"Noto Serif SC",serif}
.rev-tab.active .rt{color:var(--c,var(--ochre))}
.rev-tab .dot{width:8px;height:8px;border-radius:50%;background:var(--c,var(--ochre));margin-bottom:12px;opacity:.4;transition:opacity .25s}
.rev-tab.active .dot{opacity:1;box-shadow:0 0 12px var(--c,var(--ochre))}
.rev-panel{display:grid;grid-template-columns:1fr;gap:6px;min-height:200px;padding:8px 4px}
.rev-panel h3{font-family:"Fraunces",serif;font-size:clamp(26px,4vw,42px);font-weight:900;letter-spacing:-.02em;margin-bottom:4px;color:var(--c,var(--ochre))}
body.lang-zh .rev-panel h3{font-family:"Noto Serif SC",serif}
.rev-panel .when2{font-family:"Space Mono",monospace;font-size:12px;color:var(--dim);letter-spacing:.05em;margin-bottom:20px}
.rev-panel p{color:#d2c8b7;margin-bottom:16px;max-width:720px}
.rev-meta{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:18px}
@media(max-width:680px){.rev-meta{grid-template-columns:1fr}}
.rev-meta .k{font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.rev-meta .idea .k{color:var(--gold)} .rev-meta .cost .k{color:var(--clay)}
.rev-meta .v{font-size:15.5px;color:#c9bfae;line-height:1.55}

/* fiction lab */
#fiction{background:var(--panel)}
.lab{border:1px solid var(--line);border-radius:16px;background:var(--panel2);padding:clamp(20px,3vw,34px);margin-top:36px}
.lab-head{display:flex;justify-content:space-between;align-items:baseline;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.lab-head h3{font-family:"Fraunces",serif;font-weight:600;font-size:22px}
body.lang-zh .lab-head h3{font-family:"Noto Serif SC",serif}
.lab-head .tag{font-family:"Space Mono",monospace;font-size:11px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase}
.lab p.exp{font-size:15px;color:#c9bfae;margin-bottom:20px;max-width:720px}
.scaler{display:grid;grid-template-columns:200px 1fr;gap:24px;align-items:stretch}
@media(max-width:680px){.scaler{grid-template-columns:1fr}}
.scaler-steps{display:flex;flex-direction:column;gap:8px}
.sstep{padding:13px 15px;border:1px solid var(--line);border-radius:10px;cursor:pointer;transition:all .2s}
.sstep:hover{border-color:var(--ochre)}
.sstep.active{background:var(--c,var(--ochre));border-color:var(--c,var(--ochre));color:#1c0f06}
.sstep .sn{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.04em;opacity:.7}
.sstep .sl{font-family:"Fraunces",serif;font-weight:600;font-size:16px;margin-top:2px}
body.lang-zh .sstep .sl{font-family:"Noto Serif SC",serif}
.sstep.active .sl{color:#1c0f06}
.scaler-view{border:1px solid var(--line);border-radius:10px;background:linear-gradient(180deg,#0f0c08,#15110d);padding:18px;position:relative;min-height:230px;display:flex;flex-direction:column}
.scaler-num{font-family:"Cinzel",serif;font-weight:900;font-size:clamp(28px,5vw,46px);color:var(--c,var(--ochre));line-height:1}
.scaler-cap{font-size:14.5px;color:#c9bfae;margin:6px 0 12px;max-width:560px}
#dotfield{flex:1;display:block;width:100%;border-radius:8px}

/* real vs fiction */
.rvf-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:8px}
@media(max-width:760px){.rvf-grid{grid-template-columns:repeat(2,1fr)}}
.rvf{border:1px solid var(--line);border-radius:12px;padding:18px 16px;text-align:center;cursor:pointer;transition:all .2s;background:var(--panel)}
.rvf:hover{transform:translateY(-3px)}
.rvf .ico{font-size:30px;margin-bottom:8px;line-height:1}
.rvf .rn{font-family:"Fraunces",serif;font-weight:600;font-size:16px;margin-bottom:2px}
body.lang-zh .rvf .rn{font-family:"Noto Serif SC",serif}
.rvf .verdict{font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:.05em;margin-top:8px;min-height:14px;opacity:0;transition:opacity .3s}
.rvf.revealed .verdict{opacity:1}
.rvf.real{border-color:var(--steel)} .rvf.real .verdict{color:var(--steel)}
.rvf.fiction{border-color:var(--gold)} .rvf.fiction .verdict{color:var(--gold)}
.rvf-hint{font-family:"Space Mono",monospace;font-size:12px;color:var(--dim);margin-top:16px;text-align:center}

/* unifiers */
#unifiers{background:var(--ink)}
.uni-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:38px}
@media(max-width:820px){.uni-grid{grid-template-columns:1fr}}
.uni{border:1px solid var(--line);border-radius:14px;padding:28px 24px;background:var(--panel);position:relative;overflow:hidden;transition:transform .25s,border-color .25s}
.uni:hover{transform:translateY(-4px);border-color:var(--c)}
.uni .glyph{width:48px;height:48px;margin-bottom:16px}
.uni h3{font-family:"Fraunces",serif;font-weight:900;font-size:26px;color:var(--c);margin-bottom:4px}
body.lang-zh .uni h3{font-family:"Noto Serif SC",serif}
.uni .sub{font-family:"Space Mono",monospace;font-size:11px;color:var(--dim);letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px}
.uni p{font-size:15px;color:#c9bfae;line-height:1.58;margin-bottom:14px}
.uni .para{border-left:2px solid var(--c);padding:10px 14px;background:rgba(255,255,255,.02);font-size:14px;font-style:italic;color:#d2c8b7;border-radius:0 8px 8px 0}

/* fraud / forager-farmer */
#fraud{background:var(--panel)}
.ff{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:36px;border:1px solid var(--line);border-radius:14px;overflow:hidden}
@media(max-width:720px){.ff{grid-template-columns:1fr}}
.ff-col{padding:28px 26px}
.ff-col.forager{background:linear-gradient(180deg,rgba(154,164,106,.07),transparent)}
.ff-col.farmer{background:linear-gradient(180deg,rgba(187,86,56,.08),transparent);border-left:1px solid var(--line)}
@media(max-width:720px){.ff-col.farmer{border-left:none;border-top:1px solid var(--line)}}
.ff-col h3{font-family:"Fraunces",serif;font-weight:900;font-size:24px;margin-bottom:4px}
body.lang-zh .ff-col h3{font-family:"Noto Serif SC",serif}
.ff-col.forager h3{color:var(--sage)} .ff-col.farmer h3{color:var(--clay)}
.ff-col .when{font-family:"Space Mono",monospace;font-size:11px;color:var(--dim);letter-spacing:.05em;margin-bottom:18px}
.ff-row{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line2);font-size:14.5px;color:#c9bfae}
.ff-row:last-child{border:none}
.ff-row .lbl{font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:.04em;color:var(--faint);width:88px;flex:none;text-transform:uppercase;padding-top:2px}
body.lang-zh .ff-row .lbl{width:62px}
.fraud-punch{margin-top:26px;padding:18px 20px;border-left:2px solid var(--gold);background:rgba(216,168,80,.06);font-size:16px;color:#e3d9c8;font-style:italic;border-radius:0 8px 8px 0;max-width:820px}

/* ignorance / nexus */
#ignorance{background:var(--ink)}
.nexus{display:grid;grid-template-columns:340px 1fr;gap:48px;align-items:center;margin-top:38px}
@media(max-width:880px){.nexus{grid-template-columns:1fr;gap:28px}}
#nexus-canvas{width:100%;max-width:340px;aspect-ratio:1;margin:0 auto}
.nexus-list .ni{padding:15px 0;border-bottom:1px solid var(--line2)}
.nexus-list .ni:last-child{border:none}
.nexus-list .ni h4{font-family:"Fraunces",serif;font-weight:600;font-size:19px;margin-bottom:4px;display:flex;align-items:center;gap:10px}
body.lang-zh .nexus-list .ni h4{font-family:"Noto Serif SC",serif}
.nexus-list .ni h4 .pip{width:11px;height:11px;border-radius:3px;flex:none}
.nexus-list .ni p{font-size:14.5px;color:#c9bfae;line-height:1.55}

/* ledger chart */
#ledger{background:var(--panel)}
#ledger-canvas{width:100%;height:380px;display:block;margin-top:30px;border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,#100c08,#15110d)}
.ledger-legend{display:flex;gap:24px;flex-wrap:wrap;margin-top:18px;font-family:"Space Mono",monospace;font-size:12.5px}
.ledger-legend span{display:flex;align-items:center;gap:8px;color:var(--dim)}
.ledger-legend i{width:18px;height:3px;border-radius:2px;display:inline-block}

/* end of sapiens */
#end{background:var(--ink)}
.end-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:38px}
@media(max-width:880px){.end-grid{grid-template-columns:1fr}}
.epath{border:1px solid var(--line);border-radius:14px;padding:24px;background:var(--panel);transition:border-color .25s}
.epath:hover{border-color:var(--steel)}
.epath .en{font-family:"Space Mono",monospace;font-size:11px;color:var(--steel);letter-spacing:.08em}
.epath h3{font-family:"Fraunces",serif;font-weight:600;font-size:21px;margin:6px 0 8px}
body.lang-zh .epath h3{font-family:"Noto Serif SC",serif}
.epath p{font-size:14.5px;color:#c9bfae;line-height:1.55}

/* afterword */
#afterword{background:linear-gradient(180deg,var(--panel),#0f0a06);text-align:center}
#afterword .big{font-family:"Cinzel",serif;font-weight:900;font-size:clamp(30px,6vw,72px);line-height:1.05;letter-spacing:.02em;margin:10px auto 26px;max-width:14ch}
body.lang-zh #afterword .big{font-family:"Noto Serif SC",serif;max-width:none}
#afterword .big .arc{background:linear-gradient(100deg,var(--clay),var(--ochre) 45%,var(--gold) 72%,var(--steel));-webkit-background-clip:text;background-clip:text;color:transparent}
#afterword .lede{margin:0 auto 22px}
.aw-quote{font-family:"Fraunces",serif;font-style:italic;font-size:clamp(20px,3vw,30px);line-height:1.4;color:var(--gold);max-width:820px;margin:34px auto 0}
body.lang-zh .aw-quote{font-family:"Noto Serif SC",serif;font-style:normal;font-weight:600}
.aw-src{font-family:"Space Mono",monospace;font-size:12px;color:var(--faint);margin-top:16px;letter-spacing:.05em}

/* footer */
footer{background:var(--panel);border-top:1px solid var(--line);padding:56px clamp(16px,5vw,40px)}
.foot{max-width:var(--maxw);margin:0 auto;display:flex;justify-content:space-between;gap:30px;flex-wrap:wrap;align-items:flex-start}
.foot .col h5{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ochre);margin-bottom:14px}
.foot .col p,.foot .col a{font-size:14px;color:var(--dim);display:block;margin-bottom:8px}
.foot .col a:hover{color:var(--ochre)}

function drawDots(count,color){
  const cv=document.getElementById('dotfield');const x=cv.getContext('2d');
  const r=devicePixelRatio||1;const W=cv.width=cv.offsetWidth*r;const H=cv.height=Math.max(120,cv.offsetHeight)*r;
  if(dotAnim)cancelAnimationFrame(dotAnim);
  const pts=[];const cols=Math.ceil(Math.sqrt(count*W/H));const rows=Math.ceil(count/cols);
  for(let i=0;i<count;i++){const cx=(i%cols+0.5)/cols*W, cy=(Math.floor(i/cols)+0.5)/rows*H;pts.push({x:cx,y:cy,d:Math.random()*30,s:0});}
  let f=0;
  function frame(){f++;x.clearRect(0,0,W,H);
    pts.forEach(p=>{if(f>p.d&&p.s<1)p.s=Math.min(1,p.s+0.08);
      if(p.s>0){x.beginPath();x.arc(p.x,p.y,Math.max(1.4,(W/cols)*0.16)*p.s,0,7);
        x.fillStyle=color;x.globalAlpha=0.35+0.55*p.s;x.fill();x.globalAlpha=1;}});
    if(pts.some(p=>p.s<1))dotAnim=requestAnimationFrame(frame);
  }
  frame();
}

function drawNexus(){
  const cv=document.getElementById('nexus-canvas');if(!cv)return;
  const r=devicePixelRatio||1;const S=cv.width=cv.offsetWidth*r;cv.height=S;
  const x=cv.getContext('2d');const cx=S/2,cy=S/2,R=S*0.30;
  x.clearRect(0,0,S,S);
  const ang=[-Math.PI/2,Math.PI/6,Math.PI*5/6];
  const pts=ang.map(a=>[cx+Math.cos(a)*R,cy+Math.sin(a)*R]);
  // arrows (cycle)
  for(let i=0;i<3;i++){const a=pts[i],b=pts[(i+1)%3];
    x.strokeStyle='rgba(240,232,218,.28)';x.lineWidth=1.6*r;
    const mx=(a[0]+b[0])/2,my=(a[1]+b[1])/2;
    x.beginPath();x.moveTo(a[0],a[1]);x.lineTo(b[0],b[1]);x.stroke();
    // arrowhead
    const dx=b[0]-a[0],dy=b[1]-a[1],L=Math.hypot(dx,dy),ux=dx/L,uy=dy/L;
    x.beginPath();x.moveTo(mx,my);x.lineTo(mx-ux*9*r-uy*5*r,my-uy*9*r+ux*5*r);x.lineTo(mx-ux*9*r+uy*5*r,my-uy*9*r-ux*5*r);x.closePath();
    x.fillStyle='rgba(240,232,218,.4)';x.fill();
  }
  NEX.forEach((n,i)=>{const[px,py]=pts[i];
    x.beginPath();x.arc(px,py,30*r,0,7);
    const grd=x.createRadialGradient(px,py,2,px,py,30*r);grd.addColorStop(0,n.c+'cc');grd.addColorStop(1,n.c+'22');
    x.fillStyle=grd;x.fill();x.strokeStyle=n.c;x.lineWidth=2*r;x.stroke();
    x.fillStyle='#0d0b09';x.font=`700 ${12*r}px "Space Mono", monospace`;x.textAlign='center';x.textBaseline='middle';
    x.fillStyle='#f0e8da';x.fillText(t(n.h),px,py);
  });
}

function renderLedger(){
  const cv=document.getElementById('ledger-canvas');if(!cv)return;
  const r=devicePixelRatio||1;const W=cv.width=cv.offsetWidth*r;const H=cv.height=380*r;
  const x=cv.getContext('2d');x.clearRect(0,0,W,H);
  const padL=54*r,padR=24*r,padT=30*r,padB=46*r;const cw=W-padL-padR,ch=H-padT-padB;
  const eras=LED.eras[lang];const n=eras.length;
  // grid
  x.strokeStyle='rgba(240,232,218,.07)';x.lineWidth=r;
  for(let i=0;i<=4;i++){const y=padT+ch*i/4;x.beginPath();x.moveTo(padL,y);x.lineTo(W-padR,y);x.stroke();}
  // x labels
  x.fillStyle='rgba(168,154,133,.85)';x.font=`${11*r}px "Space Mono", monospace`;x.textAlign='center';
  eras.forEach((e,i)=>{const px=padL+cw*i/(n-1);x.fillText(e,px,H-padB+22*r);});
  // y axis hints
  x.textAlign='right';x.fillStyle='rgba(111,101,87,.9)';
  x.fillText(lang==='en'?'high':'高',padL-10*r,padT+8*r);x.fillText(lang==='en'?'low':'低',padL-10*r,padT+ch);
  // lines
  LED.lines.forEach(ln=>{
    x.beginPath();ln.v.forEach((val,i)=>{const px=padL+cw*i/(n-1),py=padT+ch*(1-val);i?x.lineTo(px,py):x.moveTo(px,py);});
    x.strokeStyle=ln.c;x.lineWidth=3*r;x.shadowColor=ln.c;x.shadowBlur=8*r;x.stroke();x.shadowBlur=0;
    ln.v.forEach((val,i)=>{const px=padL+cw*i/(n-1),py=padT+ch*(1-val);x.beginPath();x.arc(px,py,3.5*r,0,7);x.fillStyle='#f0e8da';x.fill();});
  });
  document.getElementById('ledger-legend').innerHTML=LED.lines.map(l=>`<span><i style="background:${l.c}"></i>${t(l.k)}</span>`).join('');
}

function renderEnd(){
  document.getElementById('end-grid').innerHTML=END.map(e=>`<div class="epath"><div class="en">${e.en}</div><h3>${t(e.h)}</h3><p>${t(e.p)}</p></div>`).join('');
}

function renderAll(){renderStatic();renderRev();renderScaler();renderRVF();renderUni();renderFF();renderNexus();renderLedger();renderEnd();}

/* ============ HERO DEEP-TIME CANVAS ============ */
(function(){
  const cv=document.getElementById('deeptime'),x=cv.getContext('2d');
  let W,H,stars,sparks;
  function rs(){const r=devicePixelRatio||1;W=cv.width=innerWidth*r;H=cv.height=cv.offsetHeight*r;}
  function init(){
    stars=[];const n=Math.min(160,Math.floor(W*H/16000));
    for(let i=0;i<n;i++){const dx=Math.random();stars.push({x:Math.random()*W,y:Math.random()*H,r:(Math.random()*1.4+.3)*(devicePixelRatio||1),tw:Math.random()*Math.PI*2,
      // warm on left (deep past) → cool on right (future)
      hue:dx});}
    sparks=[];
  }
  rs();init();addEventListener('resize',()=>{rs();init();});
  function col(h,a){ // h 0..1 left->right warm->cool
    if(h<0.5){const k=h/0.5;return `rgba(${216-(216-111)*0+0|0},${168-60*k|0},${80+20*k|0},${a})`;}
    const k=(h-0.5)/0.5;return `rgba(${(216-(216-111)*k)|0},${(120+50*k)|0},${(90+110*k)|0},${a})`;
  }
  function frame(tm){
    x.clearRect(0,0,W,H);
    stars.forEach(s=>{const tw=.5+.5*Math.sin(tm*.0012+s.tw);
      x.beginPath();x.arc(s.x,s.y,s.r*(0.7+tw*0.7),0,7);
      x.fillStyle=col(s.x/W,0.25+tw*0.5);x.fill();});
    if(Math.random()<0.04){const sy=Math.random()*H;sparks.push({x:0,y:sy,t:0,sp:(2+Math.random()*3)*(devicePixelRatio||1)});}
    sparks=sparks.filter(s=>s.x<W);
    sparks.forEach(s=>{s.x+=s.sp;
      x.beginPath();x.moveTo(s.x,s.y);x.lineTo(s.x-22*(devicePixelRatio||1),s.y);
      const grd=x.createLinearGradient(s.x-22,s.y,s.x,s.y);grd.addColorStop(0,'rgba(216,168,80,0)');grd.addColorStop(1,col(s.x/W,.8));
      x.strokeStyle=grd;x.lineWidth=1.6*(devicePixelRatio||1);x.stroke();});
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();

/* offset nav below injected Psyverse bar */
function offsetForBar(){
  const bar=document.getElementById('ψ-bar')||document.querySelector('[aria-label="Psyverse"]');
  const nav=document.getElementById('nav');const h=bar?Math.round(bar.getBoundingClientRect().height):0;
  nav.style.top=h+'px';document.documentElement.style.scrollPaddingTop=(h+70)+'px';
}
[300,900,1800].forEach(d=>setTimeout(offsetForBar,d));
addEventListener('resize',offsetForBar);

/* nav scroll + reveal + resizes */
addEventListener('scroll',()=>{document.getElementById('nav').classList.toggle('scrolled',scrollY>40);});
const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.1});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
addEventListener('resize',()=>{drawNexus();renderLedger();const s=SCALE[scA];drawDots(s.dots,s.c);});

renderAll();
